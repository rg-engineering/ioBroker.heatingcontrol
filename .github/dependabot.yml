# Dependabot will run on day 27 of each month at 01:35 (Europe/Berlin timezone)
version: 2
updates:

   - package-ecosystem: "github-actions"
     directory: "/"
     schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "35 1 27 * *"
     open-pull-requests-limit: 15

   - package-ecosystem: "npm"
     directory: "/"
     schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "35 1 27 * *"
     open-pull-requests-limit: 15
     versioning-strategy: "increase"

   - package-ecosystem: "npm"
     directory: "/src-admin"
     schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "35 1 27 * *"
     open-pull-requests-limit: 15
     versioning-strategy: "increase"
